<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2026 자산실사 안내 — Medialog</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #faf7f2;
      font-family: sans-serif;
      overflow-x: hidden;
    }

    /* 참고 코드와 동일하게 max-width 600px, 중앙 정렬 */
    .container {
      max-width: 350px;
      width: 100%;
      margin: 0 auto;
      background: #ffffff;
    }

    .section-img {
      width: 100%;
      display: block;
      min-height: 60px;
      opacity: 0;
      transform: translateY(20px);
      transition: opacity .6s cubic-bezier(.16,1,.3,1),
                  transform .6s cubic-bezier(.16,1,.3,1);
    }
    .section-img.in {
      opacity: 1;
      transform: translateY(0);
    }
    .section-img.hero-img {
      opacity: 1;
      transform: none;
    }

    img {
      width: 100%;
      height: auto;
      display: block;
    }
    img.error {
      background: #f0ebe0;
      min-height: 60px;
    }
  </style>
</head>
<body>

  <div class="container">

    <!-- ① 히어로 -->
    <div class="section-img hero-img">
      <img src="https://raw.githubusercontent.com/medialog-asset/erp/main/01_hero.png"
           alt="2026년도 자산실사 안내"
           onerror="this.classList.add('error')">
    </div>

    <!-- ② 자산실사란? -->
    <div class="section-img">
      <img src="https://raw.githubusercontent.com/medialog-asset/erp/main/02_overview.png"
           alt="자산실사란?"
           onerror="this.classList.add('error')">
    </div>

    <!-- ③ 주의사항 -->
    <div class="section-img">
      <img src="https://raw.githubusercontent.com/medialog-asset/erp/main/03_caution.png"
           alt="주의사항"
           onerror="this.classList.add('error')">
    </div>

  </div>

  <script>
  (function () {
    'use strict';

    const revealEls = document.querySelectorAll('.section-img:not(.hero-img)');
    const io = new IntersectionObserver((entries) => {
      entries.forEach((e, i) => {
        if (e.isIntersecting) {
          setTimeout(() => e.target.classList.add('in'), i * 100);
          io.unobserve(e.target);
        }
      });
    }, { threshold: 0, rootMargin: '0px 0px 200px 0px' });

    revealEls.forEach(el => io.observe(el));

    setTimeout(() => {
      revealEls.forEach(el => el.classList.add('in'));
    }, 1000);

  })();
  </script>

</body>
</html>
